# PIPELINE DEFINITION
# Name: mnist-style-cpu-ddp-demo
# Description: Two-task KFP pipeline: offline digits data prep + CPU PyTorch DDP training.
# Inputs:
#    batch_size: int [Default: 64.0]
#    epochs: int [Default: 5.0]
#    learning_rate: float [Default: 0.05]
#    world_size: int [Default: 2.0]
components:
  comp-distributed-train:
    executorLabel: exec-distributed-train
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        batch_size:
          defaultValue: 64.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        epochs:
          defaultValue: 5.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        learning_rate:
          defaultValue: 0.05
          isOptional: true
          parameterType: NUMBER_DOUBLE
        world_size:
          defaultValue: 2.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_DOUBLE
  comp-prepare-data:
    executorLabel: exec-prepare-data
    inputDefinitions:
      parameters:
        seed:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        test_size:
          defaultValue: 0.2
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_INTEGER
deploymentSpec:
  executors:
    exec-distributed-train:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - distributed_train
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef distributed_train(\n    dataset: dsl.Input[dsl.Dataset],\n  \
          \  model: dsl.Output[dsl.Model],\n    epochs: int = 5,\n    batch_size:\
          \ int = 64,\n    learning_rate: float = 0.05,\n    world_size: int = 2,\n\
          ) -> float:\n    \"\"\"Run CPU-only PyTorch DDP with multiple local worker\
          \ processes.\n\n    This is intentionally a very small demo:\n      - one\
          \ KFP task/pod\n      - torch.distributed backend=gloo\n      - `world_size`\
          \ local worker processes launched by torchrun\n      - rank 0 writes a TorchScript\
          \ model artifact\n\n    It demonstrates distributed data-parallel training\
          \ without requiring\n    MPIJob, Horovod, a custom training image, or additional\
          \ pip installs.\n    \"\"\"\n    import os\n    import subprocess\n    import\
          \ sys\n    import tempfile\n    import textwrap\n\n    if world_size < 2:\n\
          \        raise ValueError(\"world_size must be >= 2 for this distributed\
          \ demo.\")\n\n    os.makedirs(os.path.dirname(model.path), exist_ok=True)\n\
          \n    worker_source = r\"\"\"\nimport argparse\nimport json\nimport os\n\
          \nimport numpy as np\nimport torch\nimport torch.distributed as dist\nfrom\
          \ torch.nn.parallel import DistributedDataParallel as DDP\nfrom torch.utils.data\
          \ import DataLoader, DistributedSampler, TensorDataset\n\n\nclass DigitNet(torch.nn.Module):\n\
          \    def __init__(self):\n        super().__init__()\n        self.network\
          \ = torch.nn.Sequential(\n            torch.nn.Flatten(),\n            torch.nn.Linear(64,\
          \ 128),\n            torch.nn.ReLU(),\n            torch.nn.Linear(128,\
          \ 10),\n        )\n\n    def forward(self, x):\n        return self.network(x)\n\
          \n\ndef main():\n    parser = argparse.ArgumentParser()\n    parser.add_argument(\"\
          --data\", required=True)\n    parser.add_argument(\"--model\", required=True)\n\
          \    parser.add_argument(\"--metrics\", required=True)\n    parser.add_argument(\"\
          --epochs\", type=int, default=5)\n    parser.add_argument(\"--batch-size\"\
          , type=int, default=64)\n    parser.add_argument(\"--learning-rate\", type=float,\
          \ default=0.05)\n    args = parser.parse_args()\n\n    # torchrun sets RANK,\
          \ WORLD_SIZE, LOCAL_RANK, MASTER_ADDR, and MASTER_PORT.\n    dist.init_process_group(backend=\"\
          gloo\")\n    rank = dist.get_rank()\n    world_size = dist.get_world_size()\n\
          \n    torch.manual_seed(42)\n\n    data = np.load(args.data)\n    x_train\
          \ = torch.from_numpy(data[\"x_train\"]).float()\n    y_train = torch.from_numpy(data[\"\
          y_train\"]).long()\n    x_test = torch.from_numpy(data[\"x_test\"]).float()\n\
          \    y_test = torch.from_numpy(data[\"y_test\"]).long()\n\n    train_dataset\
          \ = TensorDataset(x_train, y_train)\n    sampler = DistributedSampler(\n\
          \        train_dataset,\n        num_replicas=world_size,\n        rank=rank,\n\
          \        shuffle=True,\n        seed=42,\n    )\n    loader = DataLoader(\n\
          \        train_dataset,\n        batch_size=args.batch_size,\n        sampler=sampler,\n\
          \        num_workers=0,\n    )\n\n    raw_model = DigitNet()\n    ddp_model\
          \ = DDP(raw_model)\n    optimizer = torch.optim.SGD(\n        ddp_model.parameters(),\n\
          \        lr=args.learning_rate,\n        momentum=0.9,\n    )\n    loss_fn\
          \ = torch.nn.CrossEntropyLoss()\n\n    for epoch in range(args.epochs):\n\
          \        sampler.set_epoch(epoch)\n        ddp_model.train()\n\n       \
          \ running_loss = 0.0\n        batches = 0\n\n        for features, labels\
          \ in loader:\n            optimizer.zero_grad(set_to_none=True)\n      \
          \      logits = ddp_model(features)\n            loss = loss_fn(logits,\
          \ labels)\n            loss.backward()\n            optimizer.step()\n\n\
          \            running_loss += float(loss.item())\n            batches +=\
          \ 1\n\n        local_loss = torch.tensor(\n            running_loss / max(batches,\
          \ 1),\n            dtype=torch.float32,\n        )\n        dist.all_reduce(local_loss,\
          \ op=dist.ReduceOp.SUM)\n        average_loss = float(local_loss.item()\
          \ / world_size)\n\n        if rank == 0:\n            print(\n         \
          \       f\"epoch={epoch + 1}/{args.epochs} \"\n                f\"world_size={world_size}\
          \ loss={average_loss:.4f}\"\n            )\n\n    # Only rank 0 evaluates\
          \ and writes the model artifact.\n    if rank == 0:\n        ddp_model.module.eval()\n\
          \        with torch.no_grad():\n            predictions = ddp_model.module(x_test).argmax(dim=1)\n\
          \            accuracy = float((predictions == y_test).float().mean().item())\n\
          \n        os.makedirs(os.path.dirname(args.model), exist_ok=True)\n\n  \
          \      # TorchScript keeps serving.py independent from the training class.\n\
          \        scripted = torch.jit.script(ddp_model.module.cpu())\n        scripted.save(args.model)\n\
          \n        with open(args.metrics, \"w\", encoding=\"utf-8\") as handle:\n\
          \            json.dump(\n                {\n                    \"accuracy\"\
          : accuracy,\n                    \"world_size\": world_size,\n         \
          \           \"epochs\": args.epochs,\n                },\n             \
          \   handle,\n            )\n\n        print(f\"accuracy={accuracy:.4f}\"\
          )\n        print(f\"model={args.model}\")\n\n    dist.barrier()\n    dist.destroy_process_group()\n\
          \n\nif __name__ == \"__main__\":\n    main()\n\"\"\"\n\n    with tempfile.TemporaryDirectory(prefix=\"\
          kfp-ddp-\") as work_dir:\n        worker_path = os.path.join(work_dir, \"\
          ddp_worker.py\")\n        metrics_path = os.path.join(work_dir, \"metrics.json\"\
          )\n\n        with open(worker_path, \"w\", encoding=\"utf-8\") as handle:\n\
          \            handle.write(textwrap.dedent(worker_source))\n\n        command\
          \ = [\n            sys.executable,\n            \"-m\",\n            \"\
          torch.distributed.run\",\n            \"--standalone\",\n            f\"\
          --nproc_per_node={world_size}\",\n            worker_path,\n           \
          \ \"--data\",\n            dataset.path,\n            \"--model\",\n   \
          \         model.path,\n            \"--metrics\",\n            metrics_path,\n\
          \            \"--epochs\",\n            str(epochs),\n            \"--batch-size\"\
          ,\n            str(batch_size),\n            \"--learning-rate\",\n    \
          \        str(learning_rate),\n        ]\n\n        print(\"Launching:\"\
          , \" \".join(command))\n        subprocess.run(command, check=True)\n\n\
          \        import json\n\n        with open(metrics_path, \"r\", encoding=\"\
          utf-8\") as handle:\n            metrics = json.load(handle)\n\n    accuracy\
          \ = float(metrics[\"accuracy\"])\n\n    model.metadata[\"framework\"] =\
          \ \"pytorch\"\n    model.metadata[\"format\"] = \"torchscript\"\n    model.metadata[\"\
          distributed_backend\"] = \"gloo\"\n    model.metadata[\"world_size\"] =\
          \ int(metrics[\"world_size\"])\n    model.metadata[\"epochs\"] = int(metrics[\"\
          epochs\"])\n    model.metadata[\"accuracy\"] = accuracy\n\n    return accuracy\n\
          \n"
        image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/runtime-pytorch:pytorch
        resources:
          cpuLimit: 4.0
          cpuRequest: 2.0
          memoryLimit: 4.294967296
          memoryRequest: 2.147483648
          resourceCpuLimit: '4'
          resourceCpuRequest: '2'
          resourceMemoryLimit: 4Gi
          resourceMemoryRequest: 2Gi
    exec-prepare-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - prepare_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef prepare_data(\n    dataset: dsl.Output[dsl.Dataset],\n    seed:\
          \ int = 42,\n    test_size: float = 0.2,\n) -> int:\n    \"\"\"Prepare a\
          \ small 0-9 handwritten-digit dataset without network access.\n\n    The\
          \ component uses sklearn.datasets.load_digits() because it is bundled with\n\
          \    scikit-learn and therefore does not require torchvision or an external\n\
          \    dataset download. The pipeline remains MNIST-style while being fully\n\
          \    offline/self-contained.\n    \"\"\"\n    import os\n\n    import numpy\
          \ as np\n    from sklearn.datasets import load_digits\n    from sklearn.model_selection\
          \ import train_test_split\n\n    digits = load_digits()\n\n    # Shape:\
          \ [N, 1, 8, 8], values normalized to [0, 1].\n    x = digits.images.astype(np.float32)\
          \ / 16.0\n    x = x[:, None, :, :]\n    y = digits.target.astype(np.int64)\n\
          \n    x_train, x_test, y_train, y_test = train_test_split(\n        x,\n\
          \        y,\n        test_size=test_size,\n        random_state=seed,\n\
          \        stratify=y,\n    )\n\n    os.makedirs(os.path.dirname(dataset.path),\
          \ exist_ok=True)\n\n    # Pass an open file handle so NumPy does not silently\
          \ append \".npz\" to the\n    # KFP artifact path.\n    with open(dataset.path,\
          \ \"wb\") as handle:\n        np.savez_compressed(\n            handle,\n\
          \            x_train=x_train,\n            y_train=y_train,\n          \
          \  x_test=x_test,\n            y_test=y_test,\n        )\n\n    dataset.metadata[\"\
          framework\"] = \"scikit-learn\"\n    dataset.metadata[\"dataset\"] = \"\
          digits\"\n    dataset.metadata[\"num_classes\"] = 10\n    dataset.metadata[\"\
          train_samples\"] = int(len(x_train))\n    dataset.metadata[\"test_samples\"\
          ] = int(len(x_test))\n    dataset.metadata[\"input_shape\"] = [1, 8, 8]\n\
          \n    print(\n        f\"Prepared dataset: train={len(x_train)}, test={len(x_test)},\
          \ \"\n        f\"path={dataset.path}\"\n    )\n    return int(len(x_train))\n\
          \n"
        image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/runtime-pytorch:pytorch
pipelineInfo:
  description: 'Two-task KFP pipeline: offline digits data prep + CPU PyTorch DDP
    training.'
  name: mnist-style-cpu-ddp-demo
root:
  dag:
    tasks:
      distributed-train:
        cachingOptions: {}
        componentRef:
          name: comp-distributed-train
        dependentTasks:
        - prepare-data
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: dataset
                producerTask: prepare-data
          parameters:
            batch_size:
              componentInputParameter: batch_size
            epochs:
              componentInputParameter: epochs
            learning_rate:
              componentInputParameter: learning_rate
            world_size:
              componentInputParameter: world_size
        taskInfo:
          name: distributed-train
      prepare-data:
        cachingOptions: {}
        componentRef:
          name: comp-prepare-data
        inputs:
          parameters:
            seed:
              runtimeValue:
                constant: 42.0
            test_size:
              runtimeValue:
                constant: 0.2
        taskInfo:
          name: prepare-data
  inputDefinitions:
    parameters:
      batch_size:
        defaultValue: 64.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      epochs:
        defaultValue: 5.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      learning_rate:
        defaultValue: 0.05
        isOptional: true
        parameterType: NUMBER_DOUBLE
      world_size:
        defaultValue: 2.0
        isOptional: true
        parameterType: NUMBER_INTEGER
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
